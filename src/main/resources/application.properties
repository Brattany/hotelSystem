spring.application.name=hotelSystem

spring.datasource.url=jdbc:mysql://localhost:3306/hotel_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.manqiYang.hotelSystem.entity

spring.web.locale=zh_CN
spring.web.locale-resolver=fixed
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.base-dir=front_uploads
agent.internal-token=
agent.validation.enable-internal-token=false
agent.validation.enforce-order-ownership=false
agent.validation.enforce-order-status=false

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

#Redis
spring:
    data:
        redis:
            host: localhost
            port: 6379
            password:
            database: 0
